# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'wfxr/tmux-power'

# config
set -g mouse on
set-option -g prefix C-Space
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g set-clipboard on
setw -g mode-style 'fg=black bg=red bold'

# keybinds
bind r source-file ~/.config/tmux/tmux.conf \; display "reloaded"

# tmux-power config
set -g @tmux_power_date_format '%F'
set -g @tmux_power_time_format '%R'
set -g @plugin 'wfxr/tmux-power'
set -g @plugin 'wfxr/tmux-net-speed'
set -g @tmux_power_theme '#8CC570'
set -g @tmux_power_g0 "#272C35"
set -g @tmux_power_g1 "#272C35"
set -g @tmux_power_g2 "#303540"
set -g @tmux_power_g3 "#383E4A"
set -g @tmux_power_g4 "#404754"
set -g @tmux_power_date_icon           ' '
set -g @tmux_power_time_icon           ' '
set -g @tmux_power_user_icon           ' '
set -g @tmux_power_session_icon        ' '
set -g @tmux_power_right_arrow_icon    ''
set -g @tmux_power_left_arrow_icon     ''
set -g @tmux_power_upload_speed_icon   '󰕒'
set -g @tmux_power_download_speed_icon '󰇚'
set -g @tmux_power_show_user    false
set -g @tmux_power_show_host    false
set -g @tmux_power_show_session false

# Initialize TPM (keep this line at the very bottom)
run '~/.config/tmux/plugins/tpm/tpm'

# Override status-right to remove time/date
set -g status-right ""
