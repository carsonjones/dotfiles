<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neovim Keybindings</title>
<style>
  :root {
    --bg: #1a1b26;
    --bg-surface: #24283b;
    --bg-hover: #292e42;
    --border: #3b4261;
    --text: #c0caf5;
    --text-dim: #565f89;
    --accent: #7aa2f7;
    --green: #9ece6a;
    --yellow: #e0af68;
    --red: #f7768e;
    --magenta: #bb9af7;
    --cyan: #7dcfff;
    --orange: #ff9e64;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    padding: 2rem;
    line-height: 1.6;
  }

  h1 {
    font-size: 1.5rem;
    color: var(--accent);
    margin-bottom: 0.25rem;
  }

  .subtitle {
    color: var(--text-dim);
    font-size: 0.8rem;
    margin-bottom: 1.5rem;
  }

  .search-wrapper {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--bg);
    padding: 0.75rem 0;
    display: flex;
    gap: 0.75rem;
    align-items: center;
    flex-wrap: wrap;
  }

  #search {
    flex: 1;
    min-width: 250px;
    padding: 0.6rem 1rem;
    font-size: 0.9rem;
    font-family: inherit;
    background: var(--bg-surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    outline: none;
    transition: border-color 0.2s;
  }
  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--text-dim); }

  .filters {
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 0.35rem 0.7rem;
    font-size: 0.75rem;
    font-family: inherit;
    background: var(--bg-surface);
    color: var(--text-dim);
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:hover { color: var(--text); border-color: var(--text-dim); }
  .filter-btn.active { color: var(--accent); border-color: var(--accent); background: rgba(122, 162, 247, 0.1); }

  .stats {
    font-size: 0.75rem;
    color: var(--text-dim);
    padding: 0.25rem 0 0.5rem;
  }

  .category {
    margin-bottom: 1.5rem;
  }

  .category-header {
    font-size: 0.9rem;
    color: var(--magenta);
    padding: 0.4rem 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 0.5rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    user-select: none;
  }
  .category-header:hover { color: var(--text); }
  .category-header .count {
    font-size: 0.7rem;
    color: var(--text-dim);
    background: var(--bg-surface);
    padding: 0.1rem 0.5rem;
    border-radius: 3px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  tr { border-bottom: 1px solid rgba(59, 66, 97, 0.4); }
  tr:hover { background: var(--bg-hover); }
  tr.hidden { display: none; }

  td {
    padding: 0.35rem 0.75rem;
    font-size: 0.8rem;
    vertical-align: top;
  }

  .col-mode {
    width: 55px;
    color: var(--text-dim);
  }

  .col-key {
    width: 150px;
    white-space: nowrap;
  }

  kbd {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 0.1rem 0.4rem;
    font-size: 0.8rem;
    color: var(--green);
    font-family: inherit;
    white-space: nowrap;
  }

  .col-desc { color: var(--text); }
  .col-source {
    color: var(--text-dim);
    font-size: 0.7rem;
    text-align: right;
    width: 130px;
  }

  .mode-tag {
    display: inline-block;
    font-size: 0.65rem;
    padding: 0.05rem 0.35rem;
    border-radius: 3px;
    margin-right: 2px;
    font-weight: 600;
  }
  .mode-n { background: rgba(122, 162, 247, 0.2); color: var(--accent); }
  .mode-v { background: rgba(187, 154, 247, 0.2); color: var(--magenta); }
  .mode-i { background: rgba(158, 206, 106, 0.2); color: var(--green); }
  .mode-t { background: rgba(255, 158, 100, 0.2); color: var(--orange); }
  .mode-x { background: rgba(224, 175, 104, 0.2); color: var(--yellow); }
  .mode-o { background: rgba(125, 207, 255, 0.2); color: var(--cyan); }
  .mode-s { background: rgba(247, 118, 142, 0.2); color: var(--red); }

  mark {
    background: rgba(224, 175, 104, 0.3);
    color: var(--yellow);
    border-radius: 2px;
    padding: 0 1px;
  }

  .empty-state {
    text-align: center;
    padding: 3rem;
    color: var(--text-dim);
    display: none;
  }

  .leader-note {
    font-size: 0.75rem;
    color: var(--text-dim);
    background: var(--bg-surface);
    padding: 0.5rem 0.75rem;
    border-radius: 4px;
    margin-bottom: 1rem;
    border-left: 3px solid var(--accent);
  }
  .leader-note kbd { font-size: 0.7rem; }
</style>
</head>
<body>

<h1>Neovim Keybindings</h1>
<p class="subtitle">~/src/dotfiles/nvim &mdash; auto-generated from config</p>

<div class="leader-note">
  <kbd>&lt;leader&gt;</kbd> = <kbd>Space</kbd> &nbsp;&bull;&nbsp;
  <kbd>&lt;C-x&gt;</kbd> = Ctrl+x &nbsp;&bull;&nbsp;
  <kbd>&lt;A-x&gt;</kbd> = Alt/Option+x &nbsp;&bull;&nbsp;
  <kbd>&lt;D-x&gt;</kbd> = Cmd+x
</div>

<div class="search-wrapper">
  <input type="text" id="search" placeholder="Search keybindings... (key, description, mode, category)" autofocus>
  <div class="filters">
    <button class="filter-btn active" data-mode="all">All</button>
    <button class="filter-btn" data-mode="n">Normal</button>
    <button class="filter-btn" data-mode="v">Visual</button>
    <button class="filter-btn" data-mode="i">Insert</button>
    <button class="filter-btn" data-mode="t">Terminal</button>
    <button class="filter-btn" data-mode="o">Op-pending</button>
  </div>
</div>
<div class="stats" id="stats"></div>
<div class="empty-state" id="empty">No keybindings match your search.</div>
<div id="content"></div>

  { mode: "n", key: "ca{", desc: "Change around braces", cat: "Defaults (Editing)", src: "vim" },
  { mode: "v", key: "y", desc: "Yank selection", cat: "Defaults (Editing)", src: "vim" },
  { mode: "v", key: "d", desc: "Delete selection", cat: "Defaults (Editing)", src: "vim" },
  { mode: "v", key: ">", desc: "Indent selection", cat: "Defaults (Editing)", src: "vim" },
  { mode: "v", key: "<", desc: "Unindent selection", cat: "Defaults (Editing)", src: "vim" },

  // Defaults: Visual mode
  { mode: "n", key: "v", desc: "Enter visual mode", cat: "Defaults (Visual)", src: "vim" },
  { mode: "n", key: "V", desc: "Enter visual line mode", cat: "Defaults (Visual)", src: "vim" },
  { mode: "n", key: "<C-v>", desc: "Enter visual block mode", cat: "Defaults (Visual)", src: "vim" },

  // Defaults: Marks & registers
  { mode: "n", key: "m{a-z}", desc: "Set mark", cat: "Defaults (Marks)", src: "vim" },
  { mode: "n", key: "'{a-z}", desc: "Jump to mark (line)", cat: "Defaults (Marks)", src: "vim" },
  { mode: "n", key: "\"{reg}y", desc: "Yank into register", cat: "Defaults (Marks)", src: "vim" },

  // Defaults: Folding
  { mode: "n", key: "za", desc: "Toggle fold", cat: "Defaults (Folding)", src: "vim" },

  { mode: "n", key: "gT", desc: "Previous tab", cat: "Defaults (Tabs)", src: "vim" },
  { mode: "n", key: ":tabclose", desc: "Close tab", cat: "Defaults (Tabs)", src: "vim" },
];

const modeLabels = { n: "Normal", v: "Visual", i: "Insert", t: "Terminal", x: "Visual/Select", o: "Op-pending", s: "Select" };

function renderModes(modeStr) {
  return modeStr.split(",").map(m => {
    const mt = m.trim();
    const cls = `mode-${mt}`;
    const label = modeLabels[mt] || mt;
    return `<span class="mode-tag ${cls}" title="${label}">${mt.toUpperCase()}</span>`;
  }).join("");
}

function escapeHtml(s) {
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function highlightText(text, query) {
  if (!query) return escapeHtml(text);
  const escaped = escapeHtml(text);
  const re = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
  return escaped.replace(re, '<mark>$1</mark>');
}

function render(query, modeFilter) {
  const q = (query || "").toLowerCase();
  const content = document.getElementById("content");
  const empty = document.getElementById("empty");
  const stats = document.getElementById("stats");

  const filtered = BINDINGS.filter(b => {
    if (modeFilter !== "all") {
      const modes = b.mode.split(",").map(m => m.trim());
      if (!modes.includes(modeFilter)) return false;
    }
    if (!q) return true;
    const searchable = `${b.key} ${b.desc} ${b.cat} ${b.mode} ${b.src}`.toLowerCase();
    return searchable.includes(q);
  });

  const grouped = {};
  filtered.forEach(b => {
    if (!grouped[b.cat]) grouped[b.cat] = [];
    grouped[b.cat].push(b);
  });

  const cats = Object.keys(grouped);
  stats.textContent = `${filtered.length} keybinding${filtered.length !== 1 ? 's' : ''} shown across ${cats.length} categor${cats.length !== 1 ? 'ies' : 'y'}`;
  empty.style.display = cats.length === 0 ? "block" : "none";

  content.innerHTML = cats.map(cat => `
    <div class="category">
      <div class="category-header">
        <span>${escapeHtml(cat)}</span>
        <span class="count">${grouped[cat].length}</span>
      </div>
      <table>
        ${grouped[cat].map(b => `
          <tr>
            <td class="col-mode">${renderModes(b.mode)}</td>
            <td class="col-key"><kbd>${highlightText(b.key, q)}</kbd></td>
            <td class="col-desc">${highlightText(b.desc, q)}</td>
            <td class="col-source">${escapeHtml(b.src)}</td>
          </tr>
        `).join("")}
      </table>
    </div>
  `).join("");
}

// Search
const searchInput = document.getElementById("search");
let activeMode = "all";

searchInput.addEventListener("input", () => render(searchInput.value, activeMode));

// Mode filters
document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeMode = btn.dataset.mode;
    render(searchInput.value, activeMode);
  });
});

// Keyboard shortcut: / to focus search
document.addEventListener("keydown", (e) => {
  if (e.key === "/" && document.activeElement !== searchInput) {
    e.preventDefault();
    searchInput.focus();
  }
  if (e.key === "Escape" && document.activeElement === searchInput) {
    searchInput.value = "";
    render("", activeMode);
    searchInput.blur();
  }
});

// Initial render
render("", "all");
</script>
